<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Конструктор промптов</title>
<meta name="theme-color" content="#2B1F3D">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&display=swap');

  :root {
    --paper: #F7F3ED;
    --ink: #2B1F3D;
    --pink: #FF3D9A;
    --cyan: #3DD9FF;
    --yellow: #FFD23D;
    --card: #FFFFFF;
    --muted: #8A7F99;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(255,61,154,0.07) 0%, transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(61,217,255,0.08) 0%, transparent 35%);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    padding: 0 0 48px;
  }

  .display { font-family: 'Archivo Black', sans-serif; }

  header {
    padding: 28px 20px 18px;
    text-align: center;
  }

  header h1 {
    font-size: 1.5rem;
    margin: 0 0 6px;
    letter-spacing: -0.02em;
  }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 500;
  }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .sticker {
    background: var(--card);
    border-radius: 18px;
    padding: 18px 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 0 rgba(43,31,61,0.06), 0 8px 24px rgba(43,31,61,0.06);
    position: relative;
  }

  .sticker::before {
    content: '';
    position: absolute;
    top: -6px; left: 18px;
    width: 28px; height: 12px;
    background: var(--yellow);
    border-radius: 2px;
    transform: rotate(-4deg);
    opacity: 0.9;
  }

  .sticker.tilt-r::before { transform: rotate(5deg); background: var(--pink); }
  .sticker.tilt-cyan::before { background: var(--cyan); }

  label.field-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  textarea, select {
    width: 100%;
    border: 2px solid #ECE4F0;
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.15s;
  }

  textarea:focus, select:focus {
    outline: none;
    border-color: var(--pink);
  }

  textarea {
    resize: vertical;
    min-height: 84px;
  }

  .manual-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .manual-row .field { margin-top: 12px; }

  .manual-row label.field-label { margin-bottom: 6px; font-size: 0.65rem; }

  button.build {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.01em;
    cursor: pointer;
    margin: 4px 0 20px;
    transition: transform 0.12s ease;
  }

  button.build:active { transform: scale(0.98); }

  button.build:disabled {
    opacity: 0.5;
    cursor: default;
  }

  #result-wrap { display: none; }

  #result-wrap.visible { display: block; }

  .result-card {
    background: var(--ink);
    color: var(--paper);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .result-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 90px; height: 90px;
    background: var(--pink);
    border-radius: 50%;
    opacity: 0.18;
    transform: translate(30%,-30%);
  }

  .result-label {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--cyan);
    margin-bottom: 10px;
    display: block;
  }

  .result-text {
    font-size: 0.98rem;
    line-height: 1.55;
    font-weight: 500;
    white-space: pre-wrap;
  }

  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .pill {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 100px;
    background: rgba(255,255,255,0.08);
    color: var(--paper);
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  button.secondary {
    border: 2px solid var(--ink);
    background: transparent;
    color: var(--ink);
    border-radius: 12px;
    padding: 13px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
  }

  button.secondary.filled {
    background: var(--ink);
    color: var(--paper);
  }

  button.secondary:active { transform: scale(0.98); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 700;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.4;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <h1 class="display">КОНСТРУКТОР ПРОМПТОВ</h1>
  <p>Midjourney · мягкий киберпанк / стритарт</p>
</header>

<main>
  <div class="sticker">
    <label class="field-label" for="idea">Твоя идея</label>
    <textarea id="idea" placeholder="Например: женщина курит у окна, за окном дождь, вечер, нью-йорк"></textarea>
    <p class="hint">Опиши сцену своими словами — кто, что делает, где. Остальное конструктор соберёт сам.</p>
  </div>

  <div class="sticker tilt-r">
    <label class="field-label">Ручная настройка (необязательно)</label>
    <div class="manual-row">
      <div class="field">
        <label class="field-label" for="lens-select">Объектив</label>
        <select id="lens-select">
          <option value="">Авто</option>
          <option value="объектив 85 мм с малой глубиной резкости">85 мм</option>
          <option value="объектив 50 мм с малой глубиной резкости">50 мм</option>
          <option value="широкоугольный объектив 24 мм">Широкоугольный 24 мм</option>
          <option value="объектив 35 мм с малой глубиной резкости">35 мм</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label" for="light-select">Свет</label>
        <select id="light-select">
          <option value="">Авто</option>
          <option value="мягкий естественный дневной свет, контраст с яркими цветными акцентами">Дневной</option>
          <option value="тёплый неон смешивается с уличными огнями">Неон вечером</option>
          <option value="разноцветная неоновая подсветка в помещении">Неон в помещении</option>
          <option value="мягкое контровое освещение, тёплый контур по силуэту">Контровое</option>
        </select>
      </div>
    </div>
  </div>

  <button class="build display" id="build-btn">Собрать промпт</button>

  <div id="result-wrap">
    <div class="result-card">
      <span class="result-label">Готовый промпт</span>
      <div class="result-text" id="result-text"></div>
      <div class="pill-row" id="pill-row"></div>
    </div>
    <div class="actions">
      <button class="secondary filled" id="copy-btn">Скопировать</button>
      <button class="secondary" id="again-btn">Другой вариант</button>
    </div>
  </div>
</main>

<div class="toast" id="toast">Промпт скопирован</div>

<script>
(function () {
  "use strict";

  // ---------- Словари ----------

  var SHOT_TYPES = [
    { triggers: ["крупный план", "лицо", "глаза"], value: "Крупный план" },
    { triggers: ["портрет"], value: "Портрет" },
    { triggers: ["бежит", "прыгает", "танцует", "экшн", "движени"], value: "Динамичная экшн-сцена" },
    { triggers: [], value: "Кинематографичный кадр", isDefault: true }
  ];

  var ENVIRONMENTS = [
    { triggers: ["бар", "клуб"], value: "модный бар с неоновыми вывесками в дневном свете, барная стойка, мягкие диваны" },
    { triggers: ["спортзал", "тренаж", "тренировк", "зал"], value: "спортзал с яркими цветными зонами, зеркальные стены, неоновая разметка на полу" },
    { triggers: ["лофт", "квартир", "дома", "комнат"], value: "стильный лофт с большими окнами, бетон сочетается с тёплым деревом и комнатными растениями" },
    { triggers: ["улиц", "город", "город"], value: "современный оживлённый город днём, яркие фасады, цветные граффити-муралы на стенах" },
    { triggers: [], value: "современный оживлённый город днём, яркие фасады, цветные граффити-муралы на стенах", isDefault: true }
  ];

  var LENSES = [
    { triggers: ["крупный план", "портрет", "лицо"], value: "объектив 85 мм с малой глубиной резкости" },
    { triggers: ["широк", "пейзаж", "панорам"], value: "широкоугольный объектив 24 мм" },
    { triggers: [], value: "объектив 50 мм с малой глубиной резкости", isDefault: true }
  ];

  var LIGHTING = [
    { triggers: ["ночь", "вечер"], value: "тёплый неон смешивается с уличными огнями" },
    { triggers: ["бар", "клуб"], value: "разноцветная неоновая подсветка в помещении" },
    { triggers: [], value: "мягкий естественный дневной свет, контраст с яркими цветными акцентами", isDefault: true }
  ];

  var COMPOSITIONS_ALL = [
    "Eye-level close-up shot", "Extreme close-up", "Macro shot", "Medium shot",
    "High angle shot", "Low angle shot", "Eye level neutral shot", "Wide shot high angle",
    "Extreme close-up low angle", "Over the shoulder shot", "Bird's eye view",
    "Point of view shot", "Dutch angle tilted shot", "Side profile shot",
    "Three-quarter angle shot", "Extreme low angle worm's eye view",
    "Extreme canted frame", "Silhouette shot"
  ];

  var COMPOSITION_RULES = [
    { triggers: ["сверху", "птич"], value: "Bird's eye view" },
    { triggers: ["снизу"], value: "Low angle shot" },
    { triggers: ["профиль", "бок"], value: "Side profile shot" },
    { triggers: ["силуэт"], value: "Silhouette shot" },
    { triggers: ["взгляд", "глазами", "от первого лица"], value: "Point of view shot" },
    { triggers: ["через плечо"], value: "Over the shoulder shot" },
    { triggers: ["макро", "деталь"], value: "Macro shot" }
  ];

  var EXTRA_DETAILS = "яркие цветные отражения в стекле и зеркалах, насыщенные сочные цвета, динамичные тени от солнца";
  var APPEARANCE_BLOCK = "яркая современная одежда, стильная причёска с нестандартным цветом волос, чистая кожа лица, лёгкий выразительный макияж";

  // ---------- Утилиты ----------

  function normalize(text) {
    return text.toLowerCase();
  }

  function matchRule(rules, normalizedText) {
    for (var i = 0; i < rules.length; i++) {
      var rule = rules[i];
      if (rule.isDefault) continue;
      for (var j = 0; j < rule.triggers.length; j++) {
        if (normalizedText.indexOf(rule.triggers[j]) !== -1) {
          return rule.value;
        }
      }
    }
    var fallback = rules.filter(function (r) { return r.isDefault; })[0];
    return fallback ? fallback.value : rules[rules.length - 1].value;
  }

  function pickComposition(normalizedText) {
    for (var i = 0; i < COMPOSITION_RULES.length; i++) {
      var rule = COMPOSITION_RULES[i];
      for (var j = 0; j < rule.triggers.length; j++) {
        if (normalizedText.indexOf(rule.triggers[j]) !== -1) {
          return rule.value;
        }
      }
    }
    return COMPOSITIONS_ALL[Math.floor(Math.random() * COMPOSITIONS_ALL.length)];
  }

  function applyGenderRule(text) {
    return text.replace(/девушк[аеуй]?/gi, function (match) {
      var isCapitalized = match[0] === match[0].toUpperCase();
      var result = "женщина";
      return isCapitalized ? result.charAt(0).toUpperCase() + result.slice(1) : result;
    });
  }

  function hasAppearanceMention(normalizedText) {
    var markers = ["волос", "макияж", "одежд", "причёск", "одет", "куртк", "худи"];
    return markers.some(function (m) { return normalizedText.indexOf(m) !== -1; });
  }

  // ---------- Сборка промпта ----------

  function buildPrompt(rawIdea, manualLens, manualLight) {
    var idea = rawIdea.trim();
    var normalized = normalize(idea);

    var shotType = matchRule(SHOT_TYPES, normalized);
    var environment = matchRule(ENVIRONMENTS, normalized);
    var lens = manualLens || matchRule(LENSES, normalized);
    var lighting = manualLight || matchRule(LIGHTING, normalized);
    var composition = pickComposition(normalized);

    var subject = applyGenderRule(idea);
    if (!hasAppearanceMention(normalized)) {
      subject = subject + ", " + APPEARANCE_BLOCK;
    }

    var parts = [
      shotType,
      subject,
      environment,
      lens,
      lighting,
      composition,
      EXTRA_DETAILS
    ];

    return {
      text: parts.join(", ") + ".",
      meta: { shotType: shotType, composition: composition }
    };
  }

  // ---------- UI ----------

  var ideaEl = document.getElementById("idea");
  var lensEl = document.getElementById("lens-select");
  var lightEl = document.getElementById("light-select");
  var buildBtn = document.getElementById("build-btn");
  var resultWrap = document.getElementById("result-wrap");
  var resultText = document.getElementById("result-text");
  var pillRow = document.getElementById("pill-row");
  var copyBtn = document.getElementById("copy-btn");
  var againBtn = document.getElementById("again-btn");
  var toast = document.getElementById("toast");

  var lastIdea = "";

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(function () { toast.classList.remove("show"); }, 1800);
  }

  function renderResult(result) {
    resultText.textContent = result.text;
    pillRow.innerHTML = "";
    [result.meta.shotType, result.meta.composition].forEach(function (label) {
      var pill = document.createElement("span");
      pill.className = "pill";
      pill.textContent = label;
      pillRow.appendChild(pill);
    });
    resultWrap.classList.add("visible");
    resultWrap.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function runBuild() {
    var idea = ideaEl.value.trim();
    if (!idea) {
      ideaEl.focus();
      ideaEl.style.borderColor = "#FF3D9A";
      setTimeout(function () { ideaEl.style.borderColor = ""; }, 900);
      return;
    }
    lastIdea = idea;
    var result = buildPrompt(idea, lensEl.value, lightEl.value);
    renderResult(result);
  }

  buildBtn.addEventListener("click", runBuild);

  againBtn.addEventListener("click", function () {
    if (!lastIdea) return;
    var result = buildPrompt(lastIdea, lensEl.value, lightEl.value);
    renderResult(result);
  });

  copyBtn.addEventListener("click", function () {
    var text = resultText.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        showToast("Промпт скопирован");
      }).catch(function () {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  });

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      showToast("Промпт скопирован");
    } catch (e) {
      showToast("Не удалось скопировать");
    }
    document.body.removeChild(ta);
  }
})();
</script>
</body>
</html>
